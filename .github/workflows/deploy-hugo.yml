name: Deploy Hugo site from private source

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: "0.162.1"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout private Hugo source
        uses: actions/checkout@v6
        with:
          repository: parksnoopy-undergraduate/Data-Visualization-2026-Spring
          ref: pages
          token: ${{ secrets.SOURCE_ACCESS_TOKEN }}
          path: source
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo extended
        run: |
          mkdir -p "${HOME}/.local/hugo"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify Hugo
        run: hugo version

      - name: Verify source layout
        run: |
          test -f source/hugo.toml
          test -d source/content
          test -d source/static/finnish-mobility-viz
          test -d source/themes/PaperMod

      - name: Build Hugo site
        working-directory: source
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: source/public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
