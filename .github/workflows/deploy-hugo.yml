name: Deploy Hugo site from private source

# IMPORTANT FOR FUTURE AGENTS:
# This workflow lives in a separate PUBLIC Pages repository.
# It checks out this source repository into ./source.
# Committed Hugo resources live under ./source/site.
# Data/app sources live at ./source root.
# Build data at ./source, stage apps into ./source/site/static, then build Hugo from ./source/site.

on:
  push:
    branches:
      - pages
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: "0.162.1"
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout private Hugo source
        uses: actions/checkout@v6
        with:
          repository: parksnoopy-undergraduate/Data-Visualization-2026-Spring
          ref: pages
          token: ${{ secrets.SOURCE_ACCESS_TOKEN }}
          path: source
          submodules: recursive
          lfs: true
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked-out source layout
        run: |
          git -C source rev-parse --short HEAD
          find source -maxdepth 2 -mindepth 1 -print | sort | sed -n '1,120p'
          test -e source/site/hugo.toml
          test -e source/site/content
          test -e source/site/themes/PaperMod
          test -e source/data/pipeline.yml
          test -e source/scripts/pipeline/build.py
          test -e source/sunwoo
          test -e source/yoonsoo
          test -e source/muryang
          test -s source/data/wos/wos_all_2008_2023.xlsx
          test -s source/data/yoonsoo/finland.json
          python -c "from pathlib import Path; assert not Path('source/data/wos/wos_all_2008_2023.xlsx').read_bytes().startswith(b'version https://git-lfs')"

      - name: Set up Python for build-time data pipeline
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Generate app-local visualization data
        working-directory: source
        run: uvx --with pandas --with openpyxl --with pyyaml python scripts/pipeline/build.py --config data/pipeline.yml

      - name: Stage visualization apps for Hugo static publish
        working-directory: source
        run: |
          mkdir -p site/static
          cp -R sunwoo site/static/sunwoo
          cp -R yoonsoo site/static/yoonsoo
          cp -R muryang site/static/muryang

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo extended
        run: |
          mkdir -p "${HOME}/.local/hugo"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify Hugo
        run: hugo version

      - name: Build Hugo site from private source
        working-directory: source/site
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: source/site/public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
