name: Deploy Hugo Pages site

# IMPORTANT FOR FUTURE AGENTS:
# This workflow lives in the PUBLIC GitHub Pages repository.
# Hugo resources live at this repo root.
# projects/dataviz, projects/ontology, and projects/week are clean CSR/static submodules.
# No Python backend or runtime server is used. Pages deploys only static HTML/CSS/JS/JSON.
# Dataviz may run a build-time data pipeline before staging JSON; that is not a runtime backend.
# Build stages project static assets under /dataviz/, /ontology/, and /week/ before Hugo.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: "0.162.1"
  PYTHON_VERSION: "3.12"
  USE_CACHE: "true"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Pages repo
        uses: actions/checkout@v6
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        with:
          token: ${{ secrets.SOURCE_ACCESS_TOKEN }}
          submodules: false
          lfs: ${{ env.USE_CACHE != 'true' }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout project submodules
        env:
          SOURCE_ACCESS_TOKEN: ${{ secrets.SOURCE_ACCESS_TOKEN }}
          GIT_LFS_SKIP_SMUDGE: "1"
        run: |
          test -n "${SOURCE_ACCESS_TOKEN}"
          auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${SOURCE_ACCESS_TOKEN}" | base64 -w0)"
          git submodule sync --recursive
          git -c "http.https://github.com/.extraheader=${auth_header}" submodule update --init --force --recursive
          git submodule status --recursive

      - name: Checkout PaperMod theme
        uses: actions/checkout@v6
        with:
          repository: adityatelange/hugo-PaperMod
          path: themes/PaperMod
          persist-credentials: false

      - name: Sync project-owned Hugo layouts
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path.cwd()
          generated_pages = [
              ("dataviz", "list", root / "projects/dataviz/index.html"),
              ("ontology", "single", root / "projects/ontology/index.html"),
              ("week", "single", root / "projects/week/index.html"),
          ]

          for slug, kind, src in generated_pages:
              clean_dst = root / f"layouts/{slug}/{slug}.index.html"
              hugo_dst = root / f"layouts/{slug}/{kind}.{slug}.index.html"
              html = src.read_text()
              html = html.replace('src="./static/', f'src="/{slug}/static/')
              html = html.replace('href="./static/', f'href="/{slug}/static/')
              html = html.replace('src="static/', f'src="/{slug}/static/')
              html = html.replace('href="static/', f'href="/{slug}/static/')
              if slug == "dataviz":
                  html = html.replace('href="./README.md"', 'href="/"')
                  html = html.replace('← 项目说明', '← 回到首页')
              html = html.replace("import init, { get_week_status_wasm } from './pkg/week_parity_wasm.js';", "import init, { get_week_status_wasm } from '/week/pkg/week_parity_wasm.js';")
              html = html.replace("import { CONFIG } from './static/js/config.js';", "import { CONFIG } from '/week/static/js/config.js';")
              clean_dst.parent.mkdir(parents=True, exist_ok=True)
              clean_dst.write_text(html)
              hugo_dst.write_text(f'{{{{ readFile "layouts/{slug}/{slug}.index.html" | safeHTML }}}}\n')
          PY

      - name: Verify CSR source layout
        run: |
          git rev-parse --short HEAD
          find . -maxdepth 2 -mindepth 1 -print | sort | sed -n '1,140p'
          test -e hugo.toml
          test -e pages/dataviz/_index.md
          test -e pages/ontology/index.md
          test -e pages/week/index.md
          test -e layouts/dataviz/dataviz.index.html
          test -e layouts/ontology/ontology.index.html
          test -e layouts/week/week.index.html
          test -e layouts/dataviz/list.dataviz.index.html
          test -e layouts/ontology/single.ontology.index.html
          test -e layouts/week/single.week.index.html
          test -e layouts/data/single.html
          test -e themes/PaperMod
          test -e projects/dataviz/static/css/style.css
          test -e projects/dataviz/static/js/main.js
          test -e projects/dataviz/data/pipeline.yml
          test -e projects/dataviz/scripts/pipeline/build.py
          test -s projects/dataviz/static/data/city-mobility.json
          test -s projects/dataviz/static/data/timeline.json
          if [ "${USE_CACHE}" = "true" ]; then
            echo "USE_CACHE=true: skip Git LFS source data download"
          else
            git -C projects/dataviz lfs pull
            test -s projects/dataviz/data/release/wos_all_2008_2023.xlsx
            python -c "from pathlib import Path; assert not Path('projects/dataviz/data/release/wos_all_2008_2023.xlsx').read_bytes().startswith(b'version https://git-lfs')"
          fi
          test -e projects/ontology/index.html
          test -e projects/ontology/config.toml
          test -e projects/ontology/static/js/main.js
          test -e projects/ontology/static/js/data.js
          test -e projects/ontology/static/css/app.css
          test -s projects/ontology/static/data/schema.json
          test -s projects/ontology/static/data/cache.json
          test -e projects/week/Cargo.toml
          test -e projects/week/index.html

      - name: Set up Python for dataviz build-time data pipeline
        if: ${{ env.USE_CACHE != 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        if: ${{ env.USE_CACHE != 'true' }}
        uses: astral-sh/setup-uv@v8.2.0

      - name: Generate or verify dataviz release data
        working-directory: projects/dataviz
        run: |
          if [ "${USE_CACHE}" = "true" ]; then
            test -s static/data/timeline.json
            test -s static/data/funder-event.json
            test -s static/data/finland.json
            echo "USE_CACHE=true: using committed projects/dataviz/static/data JSON"
          else
            uvx --with pandas --with openpyxl --with pyyaml python scripts/pipeline/build.py --config data/pipeline.yml
          fi
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Week WASM
        working-directory: projects/week
        run: wasm-pack build --target web

      - name: Stage CSR project assets for Hugo
        run: |
          rm -rf static
          mkdir -p static/dataviz/static static/dataviz/static/data static/ontology/static static/week/static static/week/pkg
          cp -R projects/dataviz/static/. static/dataviz/static/
          cp -R projects/ontology/static/. static/ontology/static/
          cp projects/ontology/config.toml static/ontology/config.toml
          cp -R projects/week/pkg/. static/week/pkg/
          cp -R projects/week/static/. static/week/static/
          cp projects/week/config.toml static/week/config.toml

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo extended
        run: |
          mkdir -p "${HOME}/.local/hugo"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify Hugo
        run: hugo version

      - name: Build Hugo site
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

