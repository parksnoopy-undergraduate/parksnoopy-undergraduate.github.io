name: Deploy Hugo site from private source

# IMPORTANT FOR FUTURE AGENTS:
# This workflow lives in a separate PUBLIC Pages repository.
# It must NOT build the public repository root.
# It checks out this private/source repository into ./source, then builds Hugo there.
# Keep repository/ref/path/working-directory/source/public unless user explicitly changes deploy model.
# Build-time data generation is required. If source/data/pipeline.yml or
# source/scripts/pipeline/build.py is missing, fail directly instead of falling back.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: "0.162.1"
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout private Hugo source
        uses: actions/checkout@v6
        with:
          repository: parksnoopy-undergraduate/Data-Visualization-2026-Spring
          ref: pages
          token: ${{ secrets.SOURCE_ACCESS_TOKEN }}
          path: source
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked-out Hugo source layout
        run: |
          git -C source rev-parse --short HEAD
          find source -maxdepth 2 -mindepth 1 -print | sort | sed -n '1,120p'
          test -e source/hugo.toml
          test -e source/content
          test -e source/themes/PaperMod
          test -e source/data/pipeline.yml
          test -e source/scripts/pipeline/build.py
          test -e source/sunwoo
          test -e source/yoonsoo

      - name: Set up Python for build-time data pipeline
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install data pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas openpyxl pyyaml

      - name: Generate app-local visualization data
        working-directory: source
        # Current pages branch has Sunwoo source data. Yoonsoo's merged WoS input is not
        # committed yet, so deploy builds Sunwoo data only. Switch back to full pipeline
        # after source/data/yoonsoo/wos_all_2008_2023.xlsx is committed.
        run: python scripts/pipeline/build.py --config data/pipeline.yml --app sunwoo

      - name: Stage visualization apps for Hugo static publish
        working-directory: source
        run: |
          mkdir -p static
          cp -R sunwoo static/sunwoo
          cp -R yoonsoo static/yoonsoo

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo extended
        run: |
          mkdir -p "${HOME}/.local/hugo"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify Hugo
        run: hugo version

      - name: Build Hugo site from private source
        working-directory: source
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: source/public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
