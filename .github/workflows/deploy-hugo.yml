name: Deploy Hugo site from private source

# IMPORTANT FOR FUTURE AGENTS:
# This workflow lives in a separate PUBLIC Pages repository.
# It checks out this source repository into ./source.
# Hugo resources now live at ./source root, not ./source/site.
# Build generated JSON at ./source/release/data, copy it into ./source/static/data, then build Hugo from ./source.
# Do not commit generated JSON; Actions creates it inside the Pages artifact only.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: "0.162.1"
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout private Hugo source
        uses: actions/checkout@v6
        with:
          repository: parksnoopy-undergraduate/Data-Visualization-2026-Spring
          ref: pages
          token: ${{ secrets.SOURCE_ACCESS_TOKEN }}
          path: source
          submodules: recursive
          lfs: true
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked-out source layout
        run: |
          git -C source rev-parse --short HEAD
          find source -maxdepth 2 -mindepth 1 -print | sort | sed -n '1,120p'
          test -e source/hugo.toml
          test -e source/pages
          test -e source/layouts/index.html
          test -e source/themes/PaperMod
          test -e source/data/pipeline.yml
          test -e source/scripts/pipeline/build.py
          test -s source/data/release/wos_all_2008_2023.xlsx
          python -c "from pathlib import Path; assert not Path('source/data/release/wos_all_2008_2023.xlsx').read_bytes().startswith(b'version https://git-lfs')"

      - name: Set up Python for build-time data pipeline
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Generate release visualization data
        working-directory: source
        run: uvx --with pandas --with openpyxl --with pyyaml python scripts/pipeline/build.py --config data/pipeline.yml

      - name: Stage generated data for Hugo static publish
        working-directory: source
        run: |
          rm -rf static/data
          mkdir -p static/data
          cp -R release/data/. static/data/

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo extended
        run: |
          mkdir -p "${HOME}/.local/hugo"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify Hugo
        run: hugo version

      - name: Build Hugo site from private source
        working-directory: source
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: source/public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
