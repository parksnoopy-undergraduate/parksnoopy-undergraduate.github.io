baseURL = "https://parksnoopy-undergraduate.github.io/"
title = "Undergraduate Project Pages"
locale = "en-US"
defaultContentLanguage = "en"
theme = "PaperMod"
contentDir = "pages"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[outputs]
home = ["HTML", "RSS", "JSON"]

[taxonomies]
tag = "tags"
category = "categories"

relativeURLs = true
canonifyURLs = false

[pagination]
pagerSize = 10

[minify]
disableXML = true
minifyOutput = true

[params]
env = "production"
title = "Undergraduate Project Pages"
description = "Undergraduate coursework project pages."
author = ["Undergraduate Project Teams"]
mainSections = ["dataviz", "ontology"]
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = true
ShowAllPagesInArchive = true

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
limit = 10
keys = ["title", "permalink", "summary", "content"]

[params.homeInfoParams]
Title = "Undergraduate Project Pages"
Content = '''Public Pages shell for course project subpages.<br><br><a href="/dataviz/">Data Visualization</a> · <a href="/ontology/">Ontology</a>'''

[[menu.main]]
identifier = "home"
name = "Home"
url = "/"
weight = 5


[[menu.main]]
identifier = "dataviz"
name = "DataViz"
url = "/dataviz/"
weight = 10

[[menu.main]]
identifier = "ontology"
name = "Ontology"
url = "/ontology/"
weight = 20

[[menu.main]]
identifier = "archives"
name = "Archives"
url = "/archives/"
weight = 30

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
