<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ceramics KG Extractor</title>
    <script src="/ontology/static/vendor/d3.min.js"></script>
    <link rel="stylesheet" href="/ontology/static/css/app.css" />
  </head>
  <body>
    <header>
      <div class="titleRow">
        <button id="themeToggle" class="themeToggle" type="button" data-theme="yumo">御墨</button>
        <select id="lang" class="headerSelect">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="id">ID</option>
        </select>
        <h1>明清宫廷瓷器 知识抽取</h1>
      </div>
      <div class="headActions">
        <button id="toggleFaulty" class="faultyToggle" type="button">Hide faulty</button>
        <button id="clearGraph" class="clearGraph" type="button">Clear graph</button>
        <details class="exportMenu">
          <summary>Export ▾</summary>
          <div class="exportCard">
            <button class="exportAction" type="button" data-export="json">JSON</button>
            <button class="exportAction" type="button" data-export="ttl">Turtle TTL</button>
            <button class="exportAction" type="button" data-export="cypher">Neo4j Cypher</button>
          </div>
        </details>
      </div>
    </header>

    <div class="wrap">
      <aside>
        <div class="card">
          <label class="muted" for="provider">Provider</label>
          <select id="provider">
            <option value="anthropic">Anthropic</option>
            <option value="openrouter">OpenRouter</option>
          </select>

          <p id="providerInfo" class="muted">Loading provider config...</p>

          <label class="muted" for="model">Use model</label>
          <input id="model" type="text" placeholder="model id" />

          <label class="muted" for="apiKey">BYOK API key</label>
          <input id="apiKey" type="password" placeholder="paste only for this browser session" autocomplete="off" />

          <p class="muted">Upload image/document</p>
          <input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif,text/plain,.txt,.md" />
          <button id="run">Extract + Visualize</button>
          <button id="cacheBtn" type="button">See all cached</button>
        </div>

        <div id="status" class="card muted">Ready.</div>
        <div id="faults" class="card hidden"></div>
        <div id="result" class="card hidden">
          <b>Result</b>
          <pre></pre>
        </div>
      </aside>

      <main>
        <svg id="graph"></svg>
        <div id="hierarchy" class="hierarchyPanel hidden"></div>
      </main>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script src="/ontology/static/js/main.js" type="module"></script>
  </body>
</html>
