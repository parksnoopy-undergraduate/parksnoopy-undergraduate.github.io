<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ming-Qing Ceramics Knowledge Graph</title>
    <script src="/ontology/static/vendor/d3.min.js"></script>
    <link rel="stylesheet" href="/ontology/static/css/app.css" />
  </head>
  <body>
    <header>
      <div class="titleRow">
        <button id="themeToggle" class="themeToggle" type="button" data-theme="yumo">御墨</button>
        <select id="lang" class="headerSelect">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="id">ID</option>
        </select>
        <h1>明清宫廷瓷器知识图谱</h1>
      </div>
      <div class="headActions">
        <a class="schemaLink" href="/ontology/static/data/schema.rdf" target="_blank" rel="noopener">Explore the ontology behind this graph</a>
        <button id="toggleFaulty" class="faultyToggle" type="button">Hide faulty items</button>
        <button id="clearGraph" class="clearGraph" type="button">Clear graph</button>
        <details class="exportMenu">
          <summary>Export ▾</summary>
          <div class="exportCard">
            <button class="exportAction" type="button" data-export="json">JSON</button>
            <button class="exportAction" type="button" data-export="ttl">Turtle TTL</button>
            <button class="exportAction" type="button" data-export="cypher">Neo4j Cypher</button>
          </div>
        </details>
      </div>
    </header>

    <div class="wrap">
      <aside>
        <div class="card">
          <label class="muted" for="provider">Model provider</label>
          <select id="provider">
            <option value="anthropic">Anthropic</option>
            <option value="openrouter">OpenRouter</option>
          </select>

          <p id="providerInfo" class="muted">Loading provider settings...</p>

          <label class="muted" for="model">Model ID</label>
          <input id="model" type="text" placeholder="model ID" />

          <label class="muted" for="apiKey">API key override</label>
          <input id="apiKey" type="password" placeholder="paste only for this browser session" autocomplete="off" />

          <p class="muted">Choose an image or text file</p>
          <input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif,text/plain,.txt,.md" />
          <button id="run">Extract and draw graph</button>
          <button id="cacheBtn" type="button">Open cached examples</button>
        </div>

        <div id="status" class="card muted">Ready. Choose a file, or open cached examples.</div>
        <div id="faults" class="card hidden"></div>
        <div id="result" class="card hidden">
          <b>Result</b>
          <pre></pre>
        </div>
      </aside>

      <main>
        <svg id="graph"></svg>
        <div id="hierarchy" class="hierarchyPanel hidden"></div>
      </main>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script src="/ontology/static/js/main.js" type="module"></script>
  </body>
</html>
